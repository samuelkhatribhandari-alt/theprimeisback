<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackLifts</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0d0d;
  --s1:       #161616;
  --s2:       #1e1e1e;
  --b1:       rgba(255,255,255,.07);
  --b2:       rgba(255,255,255,.13);
  --acc:      #c8ff00;
  --acc-dim:  rgba(200,255,0,.09);
  --text:     #efefef;
  --muted:    #5a5a5a;
  --muted2:   #3a3a3a;
  --danger:   #ff5555;
  --r:        10px;
  --r-sm:     7px;
  --mono:     'JetBrains Mono', monospace;
  --head:     'Barlow Condensed', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--head);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:99px}
input,button,select,textarea{font-family:inherit;color:inherit}
button{cursor:pointer}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.45);cursor:pointer}

/* ─── HEADER ─────────────────────────────────────── */
header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:var(--bg);
  border-bottom:1px solid var(--b1);
}
.logo{font-size:22px;font-weight:800;letter-spacing:-.02em}
.logo b{color:var(--acc)}
.hdr-btns{display:flex;gap:8px}

/* ─── BUTTONS ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;
  border-radius:var(--r-sm);
  border:1px solid var(--b2);
  background:transparent;
  color:var(--muted);
  font-size:13px;font-weight:700;letter-spacing:.05em;
  transition:all .14s;
  white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.btn-acc{background:var(--acc);color:#000;border-color:transparent}
.btn-acc:hover{background:#d4ff1a;color:#000}
.btn-ghost{border-color:transparent;color:var(--muted2)}
.btn-ghost:hover{color:var(--muted);border-color:var(--b2)}
.btn-danger{color:var(--danger);border-color:rgba(255,85,85,.25);background:transparent}
.btn-danger:hover{background:rgba(255,85,85,.1)}

/* ─── GROUP TABS ──────────────────────────────────── */
.tabs-wrap{
  overflow-x:auto;scrollbar-width:none;
  padding:10px 20px;
  border-bottom:1px solid var(--b1);
  display:flex;gap:6px;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  padding:5px 16px;
  border-radius:99px;
  border:1px solid var(--b2);
  background:transparent;
  color:var(--muted);
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  transition:all .14s;
}
.tab:hover{color:var(--text)}
.tab.active{color:#000;border-color:transparent;font-weight:800}

/* ─── MAIN ────────────────────────────────────────── */
main{max-width:680px;width:100%;margin:0 auto;padding:18px 20px 60px}

.group-hdr{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:14px;
}
.group-hdr h2{font-size:26px;font-weight:800;letter-spacing:-.01em}
.group-hdr span{font-size:12px;color:var(--muted);font-weight:400}

/* ─── EXERCISE CARD ───────────────────────────────── */
.ex-card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--r);
  margin-bottom:5px;
  overflow:hidden;
  transition:border-color .14s;
}
.ex-card:hover{border-color:var(--b2)}
.ex-card.open{border-color:var(--b2)}

.ex-row{
  display:flex;align-items:center;gap:10px;
  padding:13px 14px;
  user-select:none;
}
.ex-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.8}
.ex-name{flex:1;font-size:15px;font-weight:700;letter-spacing:.01em;cursor:pointer}
.ex-name:hover{color:var(--acc)}

.ex-stats{
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;color:var(--muted);
}
.ex-pr{color:var(--acc)}

.ex-log-btn{
  padding:5px 11px;
  border-radius:6px;
  border:1px solid var(--b2);
  background:transparent;
  color:var(--acc);
  font-size:13px;font-weight:700;letter-spacing:.04em;
  flex-shrink:0;
  transition:all .14s;
}
.ex-log-btn:hover{background:var(--acc-dim);border-color:rgba(200,255,0,.3)}

.ex-chevron{
  color:var(--muted2);font-size:11px;cursor:pointer;
  transition:transform .2s;flex-shrink:0;
}
.ex-card.open .ex-chevron{transform:rotate(180deg)}

/* ─── HISTORY PANEL ───────────────────────────────── */
.ex-history{
  display:none;
  border-top:1px solid var(--b1);
  padding:12px 14px 14px;
}
.ex-card.open .ex-history{display:block}
.hist-empty{
  padding:18px 0 6px;
  text-align:center;
  color:var(--muted);
  font-size:14px;font-weight:400;
  letter-spacing:.02em;
}
.session-block{padding:10px 0;border-bottom:1px solid var(--b1)}
.session-block:last-child{border-bottom:none;padding-bottom:0}
.session-date{
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
}
.session-chips{display:flex;flex-wrap:wrap;gap:5px}
.set-chip{
  font-family:var(--mono);font-size:11px;
  padding:4px 9px;
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:6px;
}
.set-chip .w{color:var(--acc)}
.set-chip .note{
  color:var(--muted);font-size:10px;
  display:block;margin-top:1px;
}
.del-session{
  border:none;background:none;
  color:var(--muted2);font-size:11px;font-weight:600;letter-spacing:.04em;
  padding:0;
  transition:color .14s;
}
.del-session:hover{color:var(--danger)}

/* ─── MODAL ───────────────────────────────────────── */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(3px);
  z-index:50;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}
.overlay.open{display:flex}
@media(min-width:520px){
  .overlay{align-items:center;padding:20px}
}
.modal{
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:16px 16px 0 0;
  width:100%;
  max-width:440px;
  max-height:92dvh;
  overflow-y:auto;
  animation:modalUp .22s cubic-bezier(.16,1,.3,1);
}
@media(min-width:520px){
  .modal{border-radius:16px}
}
@keyframes modalUp{
  from{opacity:0;transform:translateY(16px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.modal-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 20px 0;
  margin-bottom:18px;
}
.modal-ttl{font-size:20px;font-weight:800;letter-spacing:-.01em}
.modal-sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:3px}
.modal-x{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--b2);background:transparent;
  color:var(--muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .14s;flex-shrink:0;
}
.modal-x:hover{color:var(--text);border-color:var(--b2)}
.modal-body{padding:0 20px 22px}

/* ─── FORM ELEMENTS ───────────────────────────────── */
.fld{margin-bottom:12px}
.fld label{
  display:block;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px;
}
.fld input,.fld select,.fld textarea{
  width:100%;
  background:var(--s2);
  border:1px solid var(--b2);
  border-radius:var(--r-sm);
  padding:10px 12px;
  font-size:14px;font-family:var(--mono);
  outline:none;
  transition:border-color .14s;
}
.fld select{font-family:var(--head);appearance:none;cursor:pointer}
.fld textarea{font-family:var(--head);font-size:14px;resize:vertical;min-height:56px}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--acc)}
.fld input[type=date]{font-family:var(--head);cursor:pointer}

/* ─── SETS TABLE ──────────────────────────────────── */
.sets-cols{
  display:grid;
  grid-template-columns:28px 1fr 1fr 28px;
  gap:6px;
  margin-bottom:5px;
  padding:0 2px;
}
.sets-cols span{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);text-align:center;
}
.set-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 28px;
  gap:6px;
  margin-bottom:5px;
  align-items:center;
}
.set-n{
  font-family:var(--mono);font-size:11px;
  color:var(--muted);text-align:center;
}
.set-row input{
  width:100%;
  background:var(--s2);
  border:1px solid var(--b2);
  border-radius:var(--r-sm);
  padding:8px 6px;
  font-size:14px;font-family:var(--mono);
  outline:none;text-align:center;
  transition:border-color .14s;
}
.set-row input:focus{border-color:var(--acc)}
.set-del{
  width:28px;height:28px;
  border-radius:6px;
  border:1px solid var(--b1);background:transparent;
  color:var(--muted2);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .14s;
}
.set-del:hover{color:var(--danger);border-color:rgba(255,85,85,.25)}
.add-set-btn{
  width:100%;margin-top:2px;margin-bottom:14px;
  padding:8px;
  border:1px dashed var(--b2);border-radius:var(--r-sm);
  background:transparent;color:var(--muted);
  font-size:13px;font-weight:700;letter-spacing:.04em;
  transition:all .14s;
}
.add-set-btn:hover{color:var(--text);border-style:solid;border-color:var(--b2)}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.modal-actions .btn{flex:1;justify-content:center;font-size:14px;padding:11px}

/* ─── RESPONSIVE ──────────────────────────────────── */
@media(max-width:480px){
  header{padding:12px 14px}
  .tabs-wrap{padding:9px 14px}
  main{padding:14px 14px 60px}
  .ex-stats{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">Track<b>Lifts</b></div>
  <div class="hdr-btns">
    <button class="btn" onclick="openAddEx()">+ Ejercicio</button>
  </div>
</header>

<div class="tabs-wrap" id="tabs"></div>

<main id="main"></main>

<!-- Log Modal -->
<div class="overlay" id="log-overlay" onclick="closeLog(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div>
        <div class="modal-ttl" id="log-title">Registrar</div>
        <div class="modal-sub" id="log-sub"></div>
      </div>
      <button class="modal-x" onclick="closeLog()">×</button>
    </div>
    <div class="modal-body">
      <div class="fld">
        <label>Fecha</label>
        <input type="date" id="log-date">
      </div>
      <div class="sets-cols">
        <span>#</span><span>Reps</span><span>Kg</span><span></span>
      </div>
      <div id="sets-container"></div>
      <button class="add-set-btn" onclick="addSetRow()">+ Serie</button>
      <div class="fld">
        <label>Nota (opcional)</label>
        <textarea id="log-note" placeholder="Ej: Aumentar peso próxima semana…" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeLog()">Cancelar</button>
        <button class="btn btn-acc" onclick="saveLog()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Exercise Modal -->
<div class="overlay" id="addex-overlay" onclick="closeAddEx(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div>
        <div class="modal-ttl">Nuevo ejercicio</div>
        <div class="modal-sub">Se añadirá a tu lista</div>
      </div>
      <button class="modal-x" onclick="closeAddEx()">×</button>
    </div>
    <div class="modal-body">
      <div class="fld">
        <label>Nombre</label>
        <input type="text" id="new-ex-name" placeholder="Ej: Fondos en paralelas">
      </div>
      <div class="fld">
        <label>Grupo muscular</label>
        <select id="new-ex-group"></select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeAddEx()">Cancelar</button>
        <button class="btn btn-acc" onclick="saveNewEx()">Añadir</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   DATA — grupos y ejercicios
   ═══════════════════════════════════════════════════ */
const GROUPS = [
  { id:'pecho',    label:'Pecho',    color:'#FF6B6B' },
  { id:'espalda',  label:'Espalda',  color:'#4ECDC4' },
  { id:'biceps',   label:'Bíceps',   color:'#A78BFA' },
  { id:'triceps',  label:'Tríceps',  color:'#FBBF24' },
  { id:'hombro',   label:'Hombro',   color:'#FFA07A' },
  { id:'pierna',   label:'Pierna',   color:'#45B7D1' },
];

const DEFAULT_EX = [
  // Pecho
  { id:'bench',       name:'Press banca',                    group:'pecho'   },
  { id:'bench_mp',    name:'Press banca multipower',         group:'pecho'   },
  { id:'bench_db',    name:'Press banca con mancuernas',     group:'pecho'   },
  { id:'pec_deck',    name:'Pec Deck',                       group:'pecho'   },
  { id:'cable_cross', name:'Cruce en poleas',                group:'pecho'   },
  { id:'press_inc_m', name:'Press inclinado (máquina)',      group:'pecho'   },
  { id:'chest_tg',    name:'Chest Press (Technogym)',        group:'pecho'   },
  { id:'inc_tg',      name:'Incline Chest Press (Technogym)',group:'pecho'   },
  { id:'wide_cp',     name:'Wide Chest Press',               group:'pecho'   },
  { id:'ps_inc',      name:'Pure Strength Incline Chest',    group:'pecho'   },
  // Espalda
  { id:'lat_pull',    name:'Jalón al pecho',                 group:'espalda' },
  { id:'lat_wide',    name:'Jalón agarre amplio',            group:'espalda' },
  { id:'lat_prone',   name:'Jalón agarre prono',             group:'espalda' },
  { id:'row',         name:'Remo',                           group:'espalda' },
  { id:'row_bar',     name:'Remo con barra',                 group:'espalda' },
  { id:'row_t',       name:'Remo en T',                      group:'espalda' },
  { id:'pullup',      name:'Dominadas',                      group:'espalda' },
  { id:'pullover',    name:'Pullover',                       group:'espalda' },
  { id:'face_pull',   name:'Face Pull',                      group:'espalda' },
  { id:'cable_ext',   name:'Extensión en polea alta unilateral', group:'espalda' },
  // Bíceps
  { id:'preacher',    name:'Curl predicador',                group:'biceps'  },
  { id:'incline_db',  name:'Curl en banco inclinado',        group:'biceps'  },
  { id:'hammer_cab',  name:'Curl martillo en polea',         group:'biceps'  },
  // Tríceps
  { id:'skull',       name:'Press francés',                  group:'triceps' },
  { id:'pushdown',    name:'Extensión en polea alta (pushdown)', group:'triceps' },
  { id:'tri_ext',     name:'Extensiones de tríceps',         group:'triceps' },
  // Hombro
  { id:'mil_press',   name:'Press militar',                  group:'hombro'  },
  { id:'lat_cab',     name:'Elevaciones laterales en polea', group:'hombro'  },
  { id:'lat_mach',    name:'Elevaciones laterales (máquina)',group:'hombro'  },
  { id:'rear_delt',   name:'Hombro posterior (Pec Deck inv.)',group:'hombro' },
  // Pierna
  { id:'leg_ext',     name:'Extensión de cuádriceps',        group:'pierna'  },
  { id:'press',       name:'Prensa',                         group:'pierna'  },
  { id:'hack',        name:'Hack Squat',                     group:'pierna'  },
  { id:'squat',       name:'Sentadilla libre',               group:'pierna'  },
  { id:'squat_mp',    name:'Sentadilla multipower',          group:'pierna'  },
  { id:'belt_sq',     name:'Belt Squat',                     group:'pierna'  },
  { id:'hip_thrust',  name:'Hip Thrust',                     group:'pierna'  },
  { id:'leg_curl_l',  name:'Curl femoral tumbado',           group:'pierna'  },
  { id:'leg_curl_s',  name:'Curl femoral sentado',           group:'pierna'  },
  { id:'leg_curl_st', name:'Curl femoral de pie',            group:'pierna'  },
  { id:'calf',        name:'Gemelos',                        group:'pierna'  },
  { id:'abs',         name:'Abdominales (crunch)',           group:'pierna'  },
];

/* ═══════════════════════════════════════════════════
   STORAGE
   data = { logs: { exId: [{ id, date, sets:[{reps,weight}], note }] }, custom: [exObj] }
   ═══════════════════════════════════════════════════ */
const LS_KEY = 'tracklifts_v1';
let data = { logs: {}, custom: [] };

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) data = JSON.parse(raw);
  } catch {}
}

function saveData() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function allExercises() {
  return [...DEFAULT_EX, ...data.custom];
}

function exLogs(exId) {
  return (data.logs[exId] || []).slice().reverse(); // newest first
}

function exPR(exId) {
  const all = data.logs[exId] || [];
  let best = 0;
  for (const session of all)
    for (const s of (session.sets || []))
      if ((s.weight || 0) > best) best = s.weight;
  return best > 0 ? best : null;
}

function exLast(exId) {
  const all = data.logs[exId] || [];
  if (!all.length) return null;
  const last = all[all.length - 1];
  if (!last.sets || !last.sets.length) return null;
  const s = last.sets[0];
  return s.weight ? `${s.weight}kg × ${s.reps}` : null;
}

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
let activeGroup = GROUPS[0].id;
let openExId    = null;     // which card is expanded
let logExId     = null;     // which exercise is being logged
let setCount    = 0;

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
function groupColor(gid) {
  return (GROUPS.find(g => g.id === gid) || {}).color || '#888';
}

function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = GROUPS.map(g => {
    const active = g.id === activeGroup;
    const style  = active ? `background:${g.color};color:#000` : '';
    return `<button class="tab${active?' active':''}" style="${style}" onclick="setGroup('${g.id}')">${g.label}</button>`;
  }).join('');
}

function renderMain() {
  const g    = GROUPS.find(g => g.id === activeGroup);
  const exs  = allExercises().filter(e => e.group === activeGroup);
  const main = document.getElementById('main');

  main.innerHTML = `
    <div class="group-hdr">
      <h2>${g.label}</h2>
      <span>${exs.length} ejercicios</span>
    </div>
    <div id="ex-list">
      ${exs.map(ex => renderCard(ex)).join('')}
    </div>
  `;
}

function renderCard(ex) {
  const color  = groupColor(ex.group);
  const pr     = exPR(ex.id);
  const last   = exLast(ex.id);
  const isOpen = openExId === ex.id;
  const logs   = exLogs(ex.id);
  const isCustom = data.custom.some(c => c.id === ex.id);

  const statsHtml = `
    <div class="ex-stats">
      ${last ? `<span>${last}</span>` : ''}
      ${pr   ? `<span class="ex-pr">PR ${pr}kg</span>` : ''}
    </div>
  `;

  const historyHtml = logs.length === 0
    ? `<div class="hist-empty">Sin sesiones. Pulsa + para registrar.</div>`
    : logs.map(session => {
        const chips = (session.sets || []).map((s, i) =>
          `<span class="set-chip">
            <span class="w">${s.weight || '—'}kg</span> × ${s.reps || '—'}
            ${session.note && i === 0 ? `<span class="note">${escHtml(session.note)}</span>` : ''}
          </span>`
        ).join('');
        return `
          <div class="session-block">
            <div class="session-date">
              ${fmtDate(session.date)}
              <button class="del-session" onclick="delSession('${ex.id}','${session.id}')">Borrar</button>
            </div>
            <div class="session-chips">${chips}</div>
          </div>`;
      }).join('');

  return `
    <div class="ex-card${isOpen?' open':''}" id="card-${ex.id}">
      <div class="ex-row">
        <span class="ex-dot" style="background:${color}"></span>
        <span class="ex-name" onclick="toggleCard('${ex.id}')">${escHtml(ex.name)}</span>
        ${statsHtml}
        <button class="ex-log-btn" onclick="openLog('${ex.id}')">+</button>
        <span class="ex-chevron" onclick="toggleCard('${ex.id}')">▼</span>
        ${isCustom ? `<button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;margin-left:2px" onclick="delCustomEx('${ex.id}')">✕</button>` : ''}
      </div>
      <div class="ex-history">${historyHtml}</div>
    </div>`;
}

function refreshCard(exId) {
  const ex = allExercises().find(e => e.id === exId);
  if (!ex) return;
  const el = document.getElementById(`card-${exId}`);
  if (!el) return;
  el.outerHTML = renderCard(ex);
}

/* ═══════════════════════════════════════════════════
   INTERACTIONS
   ═══════════════════════════════════════════════════ */
function setGroup(gid) {
  activeGroup = gid;
  openExId    = null;
  renderTabs();
  renderMain();
}

function toggleCard(exId) {
  const wasOpen = openExId === exId;
  openExId = wasOpen ? null : exId;
  // toggle open class on card
  document.querySelectorAll('.ex-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    const el = document.getElementById(`card-${exId}`);
    if (el) el.classList.add('open');
    openExId = exId;
  } else {
    openExId = null;
  }
}

function delSession(exId, sessionId) {
  if (!data.logs[exId]) return;
  data.logs[exId] = data.logs[exId].filter(s => s.id !== sessionId);
  saveData();
  const el = document.getElementById(`card-${exId}`);
  const wasOpen = el && el.classList.contains('open');
  const ex = allExercises().find(e => e.id === exId);
  if (!ex || !el) return;
  el.outerHTML = renderCard(ex);
  if (wasOpen) {
    const newEl = document.getElementById(`card-${exId}`);
    if (newEl) newEl.classList.add('open');
    openExId = exId;
  }
}

function delCustomEx(exId) {
  data.custom = data.custom.filter(c => c.id !== exId);
  saveData();
  renderMain();
}

/* ═══════════════════════════════════════════════════
   LOG MODAL
   ═══════════════════════════════════════════════════ */
function openLog(exId) {
  logExId = exId;
  const ex = allExercises().find(e => e.id === exId);
  const g  = GROUPS.find(g => g.id === ex?.group);

  document.getElementById('log-title').textContent = ex?.name || 'Registrar';
  document.getElementById('log-sub').textContent   = g?.label || '';
  document.getElementById('log-date').value        = todayISO();
  document.getElementById('log-note').value        = '';

  // Prefill reps/weight from last session
  const lastLogs = data.logs[exId];
  const lastSets = (lastLogs && lastLogs.length)
    ? lastLogs[lastLogs.length - 1].sets || []
    : [];

  const container = document.getElementById('sets-container');
  container.innerHTML = '';
  setCount = 0;

  const initSets = lastSets.length ? lastSets : [{ reps:'', weight:'' }];
  initSets.forEach(s => addSetRow(s.reps, s.weight));

  document.getElementById('log-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus first reps input
  setTimeout(() => {
    const first = container.querySelector('input');
    if (first) first.focus();
  }, 220);
}

function closeLog(e) {
  if (e && e.target !== document.getElementById('log-overlay')) return;
  document.getElementById('log-overlay').classList.remove('open');
  document.body.style.overflow = '';
  logExId = null;
}

// Override close button
document.querySelector('#log-overlay .modal-x').onclick = () => {
  document.getElementById('log-overlay').classList.remove('open');
  document.body.style.overflow = '';
  logExId = null;
};

function addSetRow(reps = '', weight = '') {
  setCount++;
  const n = setCount;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.dataset.set = n;
  row.innerHTML = `
    <span class="set-n">${n}</span>
    <input type="number" inputmode="decimal" pattern="[0-9]*"
      placeholder="10" value="${reps}" min="1" max="999" aria-label="Reps">
    <input type="number" inputmode="decimal" pattern="[0-9\.]*"
      placeholder="0" value="${weight}" min="0" max="9999" step="0.5" aria-label="Kg">
    <button class="set-del" onclick="delSetRow(this)" title="Eliminar serie">×</button>
  `;
  document.getElementById('sets-container').appendChild(row);
}

function delSetRow(btn) {
  const row = btn.closest('.set-row');
  row.remove();
  // Renumber
  document.querySelectorAll('#sets-container .set-row').forEach((r, i) => {
    r.querySelector('.set-n').textContent = i + 1;
  });
}

function saveLog() {
  if (!logExId) return;

  const date = document.getElementById('log-date').value || todayISO();
  const note = document.getElementById('log-note').value.trim();
  const rows = document.querySelectorAll('#sets-container .set-row');

  const sets = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const reps   = parseInt(inputs[0].value) || 0;
    const weight = parseFloat(inputs[1].value) || 0;
    if (reps > 0 || weight > 0) sets.push({ reps, weight });
  });

  if (!sets.length) { alert('Añade al menos una serie con datos.'); return; }

  if (!data.logs[logExId]) data.logs[logExId] = [];
  data.logs[logExId].push({ id: uid(), date, sets, note });
  saveData();

  const savedExId = logExId;

  // Close modal
  document.getElementById('log-overlay').classList.remove('open');
  document.body.style.overflow = '';
  logExId = null;

  // Refresh card in place
  const el = document.getElementById(`card-${savedExId}`);
  const wasOpen = el && el.classList.contains('open');
  const ex = allExercises().find(e => e.id === savedExId);
  if (!ex || !el) return;
  el.outerHTML = renderCard(ex);
  if (wasOpen) {
    const newEl = document.getElementById(`card-${savedExId}`);
    if (newEl) { newEl.classList.add('open'); openExId = savedExId; }
  }

  // Brief flash on the card
  const updated = document.getElementById(`card-${savedExId}`);
  if (updated) {
    updated.style.borderColor = 'rgba(200,255,0,.5)';
    setTimeout(() => { updated.style.borderColor = ''; }, 700);
  }
}

/* ═══════════════════════════════════════════════════
   ADD EXERCISE MODAL
   ═══════════════════════════════════════════════════ */
function openAddEx() {
  // Populate group select
  const sel = document.getElementById('new-ex-group');
  sel.innerHTML = GROUPS.map(g => `<option value="${g.id}">${g.label}</option>`).join('');
  sel.value = activeGroup;
  document.getElementById('new-ex-name').value = '';
  document.getElementById('addex-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('new-ex-name').focus(), 220);
}

function closeAddEx(e) {
  if (e && e.target !== document.getElementById('addex-overlay')) return;
  document.getElementById('addex-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelector('#addex-overlay .modal-x').onclick = () => {
  document.getElementById('addex-overlay').classList.remove('open');
  document.body.style.overflow = '';
};

function saveNewEx() {
  const name  = document.getElementById('new-ex-name').value.trim();
  const group = document.getElementById('new-ex-group').value;
  if (!name) { document.getElementById('new-ex-name').focus(); return; }

  // Check no duplicate name in same group
  const dup = allExercises().find(e => e.group === group && e.name.toLowerCase() === name.toLowerCase());
  if (dup) { alert('Ya existe un ejercicio con ese nombre en ese grupo.'); return; }

  const ex = { id: 'c_' + uid(), name, group };
  data.custom.push(ex);
  saveData();

  document.getElementById('addex-overlay').classList.remove('open');
  document.body.style.overflow = '';

  // Navigate to that group
  if (activeGroup !== group) {
    activeGroup = group;
    renderTabs();
  }
  renderMain();

  // Flash new card
  setTimeout(() => {
    const el = document.getElementById(`card-${ex.id}`);
    if (el) {
      el.style.borderColor = 'rgba(200,255,0,.5)';
      el.scrollIntoView({ behavior:'smooth', block:'nearest' });
      setTimeout(() => { el.style.borderColor = ''; }, 800);
    }
  }, 80);
}

/* ═══════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════ */
function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
   ═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('log-overlay').classList.contains('open')) {
      document.getElementById('log-overlay').classList.remove('open');
      document.body.style.overflow = '';
      logExId = null;
    } else if (document.getElementById('addex-overlay').classList.contains('open')) {
      document.getElementById('addex-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  }
  // Enter in modal → save
  if (e.key === 'Enter' && e.ctrlKey) {
    if (document.getElementById('log-overlay').classList.contains('open')) saveLog();
  }
});

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
loadData();
renderTabs();
renderMain();
</script>
</body>
